<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏭 Smart Warehouse – Đăng nhập</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" th:href="@{/css/style.css}"/>

  <style>
  
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 50%, #0d1f3c 0%, #0d1117 65%);
    }

    #login-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }

    .login-card {
      position: relative; z-index: 1;
      width: 420px; max-width: 95vw;
      background: rgba(22,27,34,.88);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(124,58,237,.25);
      border-radius: 24px;
      padding: 48px 44px 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(124,58,237,.08);
      animation: cardIn .6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .login-icon {
      width: 72px; height: 72px; margin: 0 auto 20px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 0 8px 30px rgba(124,58,237,.45);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 30px rgba(124,58,237,.45); }
      50%       { box-shadow: 0 8px 50px rgba(124,58,237,.75); }
    }

    .login-title { text-align: center; font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 24px; color: #fff; }
    .login-sub   { text-align: center; font-size: 13px; color: var(--txt2); margin-bottom: 32px; }

    /* Input group (icon + field) */
    .inp-group { position: relative; margin-bottom: 16px; }
    .inp-group label { display: block; font-size: 12px; font-weight: 600; color: var(--txt2); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .4px; }
    .inp-group i { position: absolute; left: 13px; bottom: 11px; color: var(--txt3); font-size: 15px; }
    .inp-group input {
      width: 100%; background: rgba(255,255,255,.04);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); color: var(--txt);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 11px 14px 11px 40px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .inp-group input:focus {
      border-color: var(--acc);
      box-shadow: 0 0 0 3px var(--acc-glow);
    }
    .inp-group input::placeholder { color: var(--txt3); }

    .eye-btn {
      position: absolute; right: 12px; bottom: 9px;
      background: none; border: none; color: var(--txt3);
      cursor: pointer; padding: 4px; font-size: 15px;
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--txt2); }

    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,.4);
      transition: transform .15s, box-shadow .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124,58,237,.55);
    }

    .login-hint {
      margin-top: 20px; padding: 10px 14px;
      background: rgba(124,58,237,.08);
      border: 1px solid rgba(124,58,237,.15);
      border-radius: var(--radius-sm);
      font-size: 12px; color: var(--txt2);
    }

    .error-box {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 14px; margin-bottom: 18px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: var(--radius-sm);
      font-size: 13px; color: #fca5a5;
    }
  </style>
</head>
<body>

  <canvas id="login-canvas"></canvas>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-icon">🏭</div>
    <div class="login-title">Smart Warehouse</div>
    <div class="login-sub">Hệ thống Quản lý Kho Thông Minh</div>


    <div class="error-box" th:if="${error}">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span th:text="${error}">Mã nhân viên hoặc mật khẩu không đúng!</span>
    </div>


    <form th:action="@{/login}" method="post">
      <div class="inp-group">
        <label for="maNV">👤 Mã nhân viên</label>
        <i class="bi bi-person-badge"></i>
        <input type="text" id="maNV" name="maNV" placeholder="Nhập mã NV (VD: NV001)" autocomplete="off" required/>
      </div>

      <div class="inp-group">
        <label for="matKhau">🔒 Mật khẩu</label>
        <i class="bi bi-lock"></i>
        <input type="password" id="matKhau" name="matKhau" placeholder="Nhập mật khẩu" required/>
        <button type="button" class="eye-btn" onclick="togglePass()" id="eye-btn">
          <i class="bi bi-eye" id="eye-icon"></i>
        </button>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập hệ thống
      </button>
    </form>

    <div class="login-hint">
      <i class="bi bi-info-circle"></i>
      <strong>Tài khoản demo:</strong> NV001 / admin123 &nbsp;·&nbsp; NV002 / ql123 &nbsp;·&nbsp; NV003 / nv123
    </div>
  </div>

  <script>
  
    (function () {
      const canvas = document.getElementById('login-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
      resize();
      window.addEventListener('resize', resize);

  
      for (let i = 0; i < 55; i++) {
        particles.push({
          x: Math.random() * 1400, y: Math.random() * 900,
          vx: (Math.random() - .5) * .35,
          vy: (Math.random() - .5) * .35,
          r: Math.random() * 1.8 + .5
        });
      }

 
      function draw() {
        ctx.clearRect(0, 0, W, H);

        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 150) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(124,58,237,${.1 * (1 - d / 150)})`;
              ctx.lineWidth = .7;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(159,103,250,.25)';
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();


    function togglePass() {
      const inp = document.getElementById('matKhau');
      const ico = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'bi bi-eye';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.querySelector('form').submit();
    });
  </script>
</body>
</html>
