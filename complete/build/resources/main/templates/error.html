<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Lỗi</title>
  <style>
    body { background:#0d1117; color:#e2e8f0; font-family:sans-serif;
           display:flex; align-items:center; justify-content:center;
           min-height:100vh; text-align:center; margin:0; }
    .box { padding:40px; }
    .code { font-size:72px; font-weight:900; color:#3b82f6; }
    a { color:#3b82f6; margin:0 8px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code" th:text="${status}">500</div>
    <h2 th:text="${error}">Lỗi hệ thống</h2>
    <p th:text="${message ?: 'Vui lòng thử lại.'}"></p>
    <a th:href="@{/dashboard}">← Về Dashboard</a>
    <a href="javascript:history.back()">Quay lại</a>
  </div>
</body>
</html>
