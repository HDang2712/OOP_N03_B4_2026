<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏢 Nhà cung cấp – Smart Warehouse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    .ncc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    @media(max-width:1000px){ .ncc-grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:640px) { .ncc-grid { grid-template-columns: 1fr; } }
    .ncc-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform .2s, box-shadow .2s; }
    .ncc-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .ncc-card-top { padding: 16px 18px; background: linear-gradient(135deg, var(--bg3), rgba(30,41,59,.8)); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .ncc-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .ncc-body { padding: 14px 18px; }
    .ncc-row  { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; color: var(--txt2); }
    .ncc-row i { color: var(--acc2); font-size: 13px; width: 14px; flex-shrink: 0; }
    .ncc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .icon-colors { --c1: #7c3aed; --c2: #3b82f6; --c3: #10b981; --c4: #f59e0b; --c5: #ec4899; --c6: #ef4444; }
  </style>
</head>
<body>
<div class="layout-wrap">
  <nav th:replace="~{fragments/layout :: sidebar}"></nav>
  <div th:replace="~{fragments/layout :: topbar}"></div>

  <main class="main ethi-subpage">
    <div class="page-header">
      <div>
        <h2>🏢 Quản lý Nhà cung cấp</h2>
        <div class="breadcrumb">
          <a th:href="@{/dashboard}">Trang chủ</a>
          <i class="bi bi-chevron-right" style="font-size:10px"></i>
          <span>Nhà cung cấp</span>
        </div>
      </div>
      <div class="flex-gap">
        <a class="btn btn-success" th:href="@{/nhacungcap/add}">
          <i class="bi bi-plus-lg"></i> Thêm nhà cung cấp
        </a>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <div class="inp-search-wrap">
        <i class="bi bi-search"></i>
        <input class="inp-search" id="ncc-search" type="text" placeholder="Tìm theo tên, mã NCC..." oninput="searchNCC()"/>
      </div>
      <span style="margin-left:auto;font-size:12px;color:var(--txt3)">
        Tổng <strong th:text="${danhSachNCC != null ? danhSachNCC.size() : 0}">0</strong> nhà cung cấp
      </span>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(danhSachNCC)}"
         class="data-card" style="text-align:center;padding:60px;color:var(--txt2)">
      <i class="bi bi-building" style="font-size:44px;display:block;margin-bottom:14px;color:var(--txt3)"></i>
      <h5 style="margin-bottom:6px">Chưa có nhà cung cấp nào</h5>
      <p style="font-size:13px;color:var(--txt3)">Nhấn "Thêm nhà cung cấp" để bắt đầu.</p>
    </div>

    <!-- NCC Cards Grid -->
    <div class="ncc-grid icon-colors" id="ncc-grid" th:unless="${#lists.isEmpty(danhSachNCC)}">
      <!--
        th:each="ncc, stat : ${danhSachNCC}"
        stat.index dùng để chọn màu icon xoay vòng theo modulo 6
      -->
      <div class="ncc-card" th:each="ncc, stat : ${danhSachNCC}"
           th:attr="data-name=${ncc.tenNCC}, data-ma=${ncc.maNCC}">

        <!-- Header card -->
        <div class="ncc-card-top">
          <div class="ncc-icon"
               th:style="${'background:rgba(' + (stat.index % 6 == 0 ? '124,58,237' : stat.index % 6 == 1 ? '59,130,246' : stat.index % 6 == 2 ? '16,185,129' : stat.index % 6 == 3 ? '245,158,11' : stat.index % 6 == 4 ? '236,72,153' : '239,68,68') + ',.15)'}">
            🏢
          </div>
          <div>
            <div style="font-weight:800;color:#fff;font-size:14px" th:text="${ncc.tenNCC}">Tên NCC</div>
            <div style="font-size:11px;color:var(--txt3)" th:text="${ncc.maNCC}">NCC001</div>
          </div>
        </div>

        <!-- Body card -->
        <div class="ncc-body">
          <div class="ncc-row">
            <i class="bi bi-telephone"></i>
            <span th:text="${ncc.soDienThoai ?: '—'}">0901 000 000</span>
          </div>
          <div class="ncc-row">
            <i class="bi bi-envelope"></i>
            <span th:text="${ncc.email ?: '—'}">email@example.com</span>
          </div>
          <div class="ncc-row">
            <i class="bi bi-geo-alt"></i>
            <span th:text="${ncc.diaChi ?: '—'}">Địa chỉ</span>
          </div>
          <!-- Footer -->
          <div class="ncc-foot">
            <span class="badge badge-green">Đang hợp tác</span>
            <div class="flex-gap">
              <a class="btn btn-warning btn-sm"
                 th:href="@{/nhacungcap/edit/{id}(id=${ncc.maNCC})}"
                 title="Sửa">
                <i class="bi bi-pencil"></i>
              </a>
              <button class="btn btn-danger btn-sm"
                      th:onclick="'confirmDelete(\'' + ${ncc.tenNCC} + '\', \'' + @{/nhacungcap/delete/{id}(id=${ncc.maNCC})} + '\')'"
                      title="Xóa">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div th:replace="~{fragments/layout :: toastArea}"></div>
<div th:replace="~{fragments/layout :: deleteModal}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  function searchNCC() {
    const q = document.getElementById('ncc-search').value.toLowerCase();
    document.querySelectorAll('#ncc-grid .ncc-card').forEach(card => {
      const name = (card.dataset.name || '').toLowerCase();
      const ma   = (card.dataset.ma   || '').toLowerCase();
      card.style.display = (!q || name.includes(q) || ma.includes(q)) ? '' : 'none';
    });
  }
</script>
</body>
</html>
